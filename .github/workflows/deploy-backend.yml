name: BE Deploy

on:
  push:
    branches: [staging]
    paths:
      - 'apps/backend/**'
      # @teeko/backend bundles @teeko/shared into its image, so a shared change
      # must redeploy the BE too.
      - 'packages/shared/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ehailing-be-staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref_name == 'staging'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push BE image
        uses: docker/build-push-action@v5
        with:
          # Repo root context: the backend image needs the pnpm workspace
          # (pnpm-workspace.yaml, lockfile, packages/shared) to resolve @teeko/shared.
          context: .
          file: ./apps/backend/Dockerfile
          push: true
          tags: |
            blueprintagency/ehailing-be:staging
            blueprintagency/ehailing-be:staging-${{ github.sha }}

      # Reach VPS3 over the Blueprint-Agency tailnet — the same VPS3 that
      # booking-system deploys to. VPS3's SSH port is NOT publicly exposed, so
      # the runner must join the tailnet (ephemeral tag:ci node) before SSHing.
      # OAuth creds + the tailnet host are ORG-level settings shared across repos.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ vars.VPS3_TAILSCALE_HOST }}

      - name: Deploy to VPS3
        uses: appleboy/ssh-action@v1
        with:
          # SSH in over Tailscale (was the public vars.VPS3_HOST before Tailscale).
          host: ${{ vars.VPS3_TAILSCALE_HOST }}
          port: 22
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 90s
          command_timeout: 20m
          debug: true
          script: |
            mkdir -p /root/stacks/ehailing
            # Backend env — must match apps/backend/src/config/env.ts (Zod parse) and
            # the process.env reads in src/lib/storage/*. DATABASE_URL is assembled
            # from the same DB_* secrets that configure the Postgres container —
            # single source of truth. db-ehailing is only reachable inside
            # ehailing-network, never exposed.
            #
            # Required GitHub settings:
            #   org vars:    VPS3_TAILSCALE_HOST            (shared with booking-system)
            #   org secrets: TS_OAUTH_CLIENT_ID, TS_OAUTH_SECRET   (shared with booking-system)
            #   repo/env vars:    PORT, LOG_LEVEL, DOCKERHUB_USERNAME, DEV_AUTH_BYPASS,
            #                     CLERK_RIDER_PUBLISHABLE_KEY, CLERK_DRIVER_PUBLISHABLE_KEY,
            #                     GMAIL_USER, COMMISSION_RATE, CANCELLATION_FEE_CENTS,
            #                     STORAGE, R2_BUCKET
            #   repo/env secrets: DB_USER, DB_PASSWORD, DB_NAME, DOCKERHUB_TOKEN, SSH_PRIVATE_KEY,
            #                     CLERK_RIDER_SECRET_KEY, CLERK_RIDER_WEBHOOK_SIGNING_SECRET,
            #                     CLERK_DRIVER_SECRET_KEY, CLERK_DRIVER_WEBHOOK_SIGNING_SECRET,
            #                     GMAIL_APP_PASSWORD, GOOGLE_MAPS_API_KEY,
            #                     R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_PUBLIC_URL
            {
              echo "NODE_ENV=production"
              # Staging-only: honour X-Teeko-User dev headers so the admin panel (no real
              # auth yet) can call the API. Set repo/env var DEV_AUTH_BYPASS=true to enable.
              echo "DEV_AUTH_BYPASS=${{ vars.DEV_AUTH_BYPASS }}"
              echo "PORT=${{ vars.PORT }}"
              echo "LOG_LEVEL=${{ vars.LOG_LEVEL }}"
              echo "TZ=Asia/Kuala_Lumpur"
              echo "DATABASE_URL=postgres://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@db-ehailing:5432/${{ secrets.DB_NAME }}"
              # Redis reached over ehailing-network, same convention as db-ehailing.
              echo "REDIS_URL=redis://redis-ehailing:6379"
              # Clerk — rider app
              echo "CLERK_RIDER_SECRET_KEY=${{ secrets.CLERK_RIDER_SECRET_KEY }}"
              echo "CLERK_RIDER_PUBLISHABLE_KEY=${{ vars.CLERK_RIDER_PUBLISHABLE_KEY }}"
              echo "CLERK_RIDER_WEBHOOK_SIGNING_SECRET=${{ secrets.CLERK_RIDER_WEBHOOK_SIGNING_SECRET }}"
              # Clerk — driver app (separate Clerk instance from rider)
              echo "CLERK_DRIVER_SECRET_KEY=${{ secrets.CLERK_DRIVER_SECRET_KEY }}"
              echo "CLERK_DRIVER_PUBLISHABLE_KEY=${{ vars.CLERK_DRIVER_PUBLISHABLE_KEY }}"
              echo "CLERK_DRIVER_WEBHOOK_SIGNING_SECRET=${{ secrets.CLERK_DRIVER_WEBHOOK_SIGNING_SECRET }}"
              # Email — Gmail SMTP (active provider)
              echo "GMAIL_USER=${{ vars.GMAIL_USER }}"
              echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}"
              # Google Maps (server-side proxy — never exposed to mobile clients)
              echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}"
              # Commission & fees — set these as repo/environment VARS, else an empty
              # value coerces to 0 (Zod .default() only fires on undefined, not "").
              echo "COMMISSION_RATE=${{ vars.COMMISSION_RATE }}"
              echo "CANCELLATION_FEE_CENTS=${{ vars.CANCELLATION_FEE_CENTS }}"
              # Payments — Stripe                                        
              echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}"
              echo "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}"
              # Storage — R2 is the active adapter for driver-web document uploads
              # (src/lib/storage/r2.adapter.ts reads these directly). STORAGE selects
              # the adapter ("r2"); a blank value falls back to the local adapter.
              echo "STORAGE=${{ vars.STORAGE }}"
              echo "R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}"
              echo "R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}"
              echo "R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}"
              echo "R2_BUCKET=${{ vars.R2_BUCKET }}"
              # R2_PUBLIC_URL is stored as a SECRET in the GitHub staging environment
              # (read from secrets, not vars) — keep it here, don't "fix" it back to vars.
              echo "R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}"
            } > /root/stacks/ehailing/.env.ehailing-be
            chmod 600 /root/stacks/ehailing/.env.ehailing-be
            # Postgres creds — same source as DATABASE_URL above
            {
              echo "POSTGRES_USER=${{ secrets.DB_USER }}"
              echo "POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}"
              echo "POSTGRES_DB=${{ secrets.DB_NAME }}"
            } > /root/stacks/ehailing/.env.ehailing-db
            chmod 600 /root/stacks/ehailing/.env.ehailing-db

            docker pull blueprintagency/ehailing-be:staging
            cd /root/stacks/ehailing
            docker compose up -d --remove-orphans

            # Wait for backend container to be running, then run DB tasks.
            # postgis + migrate are idempotent; seed should be written to be idempotent too.
            for i in $(seq 1 30); do
              if [ "$(docker inspect -f '{{.State.Running}}' ehailing-be 2>/dev/null)" = "true" ]; then
                break
              fi
              sleep 2
            done

            docker compose exec -T ehailing-be sh -c "pnpm db:postgis && pnpm db:migrate && pnpm db:seed"

            docker image prune -f
